<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frid joe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1080px, 92%);
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 22px 0;
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: lowercase;
    }

    .nav-links {
      display: flex;
      gap: 22px;
      font-size: 14px;
      color: #cbd5e1;
      text-transform: lowercase;
    }

    .hero {
      min-height: calc(100vh - 72px);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      gap: 48px;
      padding: 80px 0;
    }

    h1 {
      font-size: clamp(64px, 11vw, 140px);
      line-height: 0.9;
      letter-spacing: -0.08em;
      text-transform: lowercase;
    }

    .hero-line {
      width: 120px;
      height: 3px;
      margin-top: 34px;
      background: #2563eb;
      border-radius: 999px;
    }

    .visual {
      min-height: 460px;
      border-radius: 36px;
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.5), transparent 34%),
        radial-gradient(circle at 82% 72%, rgba(14, 165, 233, 0.28), transparent 36%),
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.34);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -0.08em;
      text-transform: lowercase;
    }

    section {
      padding: 90px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section-title {
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1;
      letter-spacing: -0.06em;
      text-transform: lowercase;
      margin-bottom: 30px;
    }

    .blank-card {
      min-height: 260px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.045);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .small-card {
      min-height: 180px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.045);
    }

    footer {
      padding: 32px 0;
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-transform: lowercase;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
        padding: 60px 0;
      }

      .visual {
        min-height: 330px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a class="logo" href="#top">frid joe</a>
      <nav class="nav-links">
        <a href="#about">about</a>
        <a href="#gallery">gallery</a>
        <a href="#links">links</a>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="container hero">
      <div>
        <h1>frid<br>joe</h1>
        <div class="hero-line"></div>
      </div>

      <div class="visual">
        <div class="circle">fj</div>
      </div>
    </section>

    <section id="about">
      <div class="container">
        <h2 class="section-title">about</h2>
        <div class="blank-card"></div>
      </div>
    </section>

    <section id="gallery">
      <div class="container">
        <h2 class="section-title">gallery</h2>
        <div class="grid">
          <div class="small-card"></div>
          <div class="small-card"></div>
          <div class="small-card"></div>
        </div>
      </div>
    </section>

    <section id="links">
      <div class="container">
        <h2 class="section-title">links</h2>
        <div class="blank-card"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">© 2026 frid joe</div>
  </footer>
</body>
</html>
